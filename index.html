<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR 觀音體驗</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        *{margin:0;padding:0}body{overflow:hidden;font-family:-apple-system,sans-serif}
        #loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:linear-gradient(135deg,#1a0a2e,#16213e);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;transition:opacity .6s}
        #loading-overlay.hidden{opacity:0;pointer-events:none}
        #loading-overlay h2{font-size:20px;background:linear-gradient(135deg,#FFD54F,#FF8A65);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
        #loading-overlay p{font-size:13px;color:rgba(255,255,255,.5)}
        .loader{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#FFD54F;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px}
        @keyframes spin{to{transform:rotate(360deg)}}
        #hud-top{position:fixed;top:0;left:0;right:0;z-index:100;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent)}
        .hud-badge{padding:6px 14px;background:rgba(0,0,0,.5);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);border-radius:20px;font-size:12px;color:#fff}
        .hud-badge.gold{border-color:rgba(255,200,60,.3);color:#FFD54F}
        .hud-badge.green{border-color:rgba(76,175,80,.4);color:#81C784}
        #scan-hint{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);z-index:100;text-align:center;animation:hintBounce 2s ease-in-out infinite;transition:opacity .5s}
        @keyframes hintBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}
        .hint-box{padding:12px 24px;background:rgba(0,0,0,.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);border-radius:16px;font-size:14px;color:#fff}
        .hint-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}
        #bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:16px;padding-bottom:max(16px,env(safe-area-inset-bottom));display:flex;justify-content:center;gap:12px;background:linear-gradient(to top,rgba(0,0,0,.5),transparent)}
        .action-btn{padding:12px 20px;border:none;border-radius:25px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
        .action-btn.primary{background:linear-gradient(135deg,#FFB74D,#FF8A65);color:#1a0a2e}
        .action-btn.secondary{background:rgba(255,255,255,.12);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.2);color:#fff}
        .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);border:1px solid rgba(255,200,60,.3);color:#FFD54F;border-radius:25px;font-size:13px;animation:toastAnim 2.5s ease forwards}
        @keyframes toastAnim{0%{opacity:0;transform:translateX(-50%) translateY(-10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}
        #info-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:5000;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px}
        #info-modal.active{display:flex}
        .modal-card{background:linear-gradient(135deg,#1e1040,#1a1a3e);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:28px;max-width:340px;width:100%}
        .modal-card h3{font-size:18px;color:#FFD54F;margin-bottom:12px}
        .modal-card p{font-size:13px;color:rgba(255,255,255,.7);line-height:1.7;margin-bottom:16px}
        .modal-close{padding:10px 24px;background:linear-gradient(135deg,#FFB74D,#FF8A65);color:#1a0a2e;border:none;border-radius:20px;font-size:14px;font-weight:700;cursor:pointer}
    </style>
</head>
<body>

<div id="loading-overlay"><div class="loader"></div><h2>AR 觀音體驗</h2><p>正在啟動相機...</p></div>

<div id="hud-top">
    <span class="hud-badge">高雄就服站</span>
    <span class="hud-badge gold" id="status-badge">搜尋中</span>
</div>

<div id="scan-hint">
    <div class="hint-box">請將相機對準 Hiro 標記圖</div>
    <div class="hint-sub">觀音將從圖上顯現</div>
</div>

<div id="bottom-bar">
    <button class="action-btn secondary" onclick="capturePhoto()">打卡</button>
    <button class="action-btn primary" onclick="showInfoModal()">就業資訊</button>
    <button class="action-btn secondary" onclick="shareExp()">分享</button>
</div>

<div id="info-modal">
    <div class="modal-card">
        <h3>就業服務資訊</h3>
        <p>歡迎來到高雄市訓練就業中心！<br><br>我們提供：<br>✦ 職業訓練課程<br>✦ 就業媒合服務<br>✦ 創業輔導諮詢<br>✦ 職涯探索工具<br><br>掃描現場其他 AR 標記，解鎖更多就業資訊！</p>
        <button class="modal-close" onclick="closeInfoModal()">了解！繼續體驗</button>
    </div>
</div>

<a-scene embedded arjs="sourceType:webcam; debugUIEnabled:false;" renderer="logarithmicDepthBuffer:true; antialias:true; alpha:true;" vr-mode-ui="enabled:false" id="ar-scene">

<a-marker preset="hiro" id="ar-marker" emitevents="true" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">

    <!--
        KEY FIX: In AR.js, the marker surface is the XY plane, and Z points INTO the marker.
        We build the statue along the Y axis, then rotate the whole thing so Y-up becomes
        "standing up from the marker surface" as seen by the camera.
        rotation="-90 0 0" on the wrapper converts Y-up model to stand on the marker.
    -->
    <a-entity rotation="-90 0 0" scale="0.8 0.8 0.8">

        <!-- LOTUS BASE -->
        <a-cylinder position="0 0.02 0" radius="0.55" height="0.04" color="#D4A574" material="opacity:0.8;transparent:true" segments-radial="24"></a-cylinder>
        <a-sphere position="0.45 0.06 0" scale="0.18 0.08 0.10" color="#E8C89E" material="opacity:0.7;transparent:true"></a-sphere>
        <a-sphere position="-0.45 0.06 0" scale="0.18 0.08 0.10" color="#E8C89E" material="opacity:0.7;transparent:true"></a-sphere>
        <a-sphere position="0 0.06 0.45" scale="0.10 0.08 0.18" color="#E8C89E" material="opacity:0.7;transparent:true"></a-sphere>
        <a-sphere position="0 0.06 -0.45" scale="0.10 0.08 0.18" color="#E8C89E" material="opacity:0.7;transparent:true"></a-sphere>
        <a-sphere position="0.32 0.06 0.32" scale="0.14 0.07 0.14" color="#EBCFA8" material="opacity:0.6;transparent:true"></a-sphere>
        <a-sphere position="-0.32 0.06 0.32" scale="0.14 0.07 0.14" color="#EBCFA8" material="opacity:0.6;transparent:true"></a-sphere>
        <a-sphere position="0.32 0.06 -0.32" scale="0.14 0.07 0.14" color="#EBCFA8" material="opacity:0.6;transparent:true"></a-sphere>
        <a-sphere position="-0.32 0.06 -0.32" scale="0.14 0.07 0.14" color="#EBCFA8" material="opacity:0.6;transparent:true"></a-sphere>
        <a-cylinder position="0 0.08 0" radius="0.38" height="0.03" color="#F0DFC0" material="opacity:0.65;transparent:true" segments-radial="20"></a-cylinder>

        <!-- LOWER ROBE -->
        <a-cone position="0 0.45 0" radius-bottom="0.40" radius-top="0.18" height="0.70" color="#F5ECD8" material="opacity:0.92;transparent:true;side:double" segments-radial="24"></a-cone>

        <!-- UPPER TORSO -->
        <a-cone position="0 0.95 0" radius-bottom="0.18" radius-top="0.10" height="0.40" color="#F5ECD8" material="opacity:0.92;transparent:true;side:double" segments-radial="16"></a-cone>

        <!-- SHOULDERS -->
        <a-sphere position="0 1.05 0" scale="0.22 0.07 0.13" color="#F5ECD8" material="opacity:0.85;transparent:true"></a-sphere>

        <!-- NECK -->
        <a-cylinder position="0 1.16 0" radius="0.055" height="0.10" color="#F8F0E0" material="opacity:0.9;transparent:true" segments-radial="12"></a-cylinder>

        <!-- HEAD -->
        <a-sphere position="0 1.30 0" scale="0.13 0.16 0.13" color="#F8F0E0" material="opacity:0.95;transparent:true"></a-sphere>

        <!-- HAIR -->
        <a-sphere position="0 1.40 -0.01" scale="0.12 0.09 0.11" color="#4A3A2A" material="opacity:0.85;transparent:true"></a-sphere>

        <!-- CROWN -->
        <a-cone position="0 1.54 0" radius-bottom="0.08" radius-top="0.025" height="0.22" color="#C9A96E" material="opacity:0.9;transparent:true" segments-radial="8"></a-cone>
        <a-sphere position="0 1.66 0" radius="0.032" color="#FFD54F" material="opacity:0.95;transparent:true;emissive:#FFD54F;emissiveIntensity:0.8"></a-sphere>

        <!-- HALO -->
        <a-torus position="0 1.32 -0.10" radius="0.28" radius-tubular="0.012" color="#FFD54F" material="opacity:0.6;transparent:true;emissive:#FFD54F;emissiveIntensity:1.0" segments-radial="40" segments-tubular="12"></a-torus>
        <a-torus position="0 1.32 -0.12" radius="0.36" radius-tubular="0.008" color="#FFA726" material="opacity:0.3;transparent:true;emissive:#FFA726;emissiveIntensity:0.5" segments-radial="40" segments-tubular="12"></a-torus>

        <!-- LEFT ARM -->
        <a-cylinder position="-0.16 0.88 0.04" radius="0.04" height="0.30" rotation="0 0 12" color="#F5ECD8" material="opacity:0.85;transparent:true" segments-radial="10"></a-cylinder>
        <a-cylinder position="-0.10 0.68 0.10" radius="0.033" height="0.22" rotation="30 0 5" color="#F8F0E0" material="opacity:0.85;transparent:true" segments-radial="10"></a-cylinder>

        <!-- RIGHT ARM -->
        <a-cylinder position="0.16 0.88 0.04" radius="0.04" height="0.30" rotation="0 0 -12" color="#F5ECD8" material="opacity:0.85;transparent:true" segments-radial="10"></a-cylinder>
        <a-cylinder position="0.10 0.68 0.10" radius="0.033" height="0.22" rotation="30 0 -5" color="#F8F0E0" material="opacity:0.85;transparent:true" segments-radial="10"></a-cylinder>

        <!-- HANDS -->
        <a-sphere position="0 0.56 0.15" radius="0.05" color="#F8F0E0" material="opacity:0.9;transparent:true"></a-sphere>

        <!-- VASE -->
        <a-cylinder position="0 0.50 0.17" radius="0.028" height="0.09" color="#FFFFFF" material="opacity:0.85;transparent:true"></a-cylinder>
        <a-sphere position="0 0.46 0.17" radius="0.033" color="#FFFFFF" material="opacity:0.8;transparent:true"></a-sphere>
        <a-cylinder position="0 0.56 0.17" radius="0.013" height="0.05" color="#FFFFFF" material="opacity:0.8;transparent:true"></a-cylinder>

        <!-- WILLOW -->
        <a-cylinder position="0.02 0.62 0.18" radius="0.005" height="0.12" rotation="-15 0 10" color="#7CB342" material="opacity:0.75;transparent:true"></a-cylinder>
        <a-cylinder position="0.04 0.70 0.19" radius="0.004" height="0.08" rotation="-25 0 20" color="#8BC34A" material="opacity:0.65;transparent:true"></a-cylinder>
        <a-sphere position="0.06 0.74 0.20" scale="0.025 0.008 0.012" color="#9CCC65" material="opacity:0.6;transparent:true"></a-sphere>

        <!-- SCARVES -->
        <a-cylinder position="-0.28 0.70 -0.02" radius="0.014" height="0.65" rotation="0 0 6" color="#FFE0B2" material="opacity:0.30;transparent:true"></a-cylinder>
        <a-cylinder position="0.28 0.70 -0.02" radius="0.014" height="0.65" rotation="0 0 -6" color="#FFE0B2" material="opacity:0.30;transparent:true"></a-cylinder>

        <!-- NECKLACE -->
        <a-torus position="0 1.06 0.04" rotation="90 0 0" radius="0.10" radius-tubular="0.005" color="#C9A96E" material="opacity:0.55;transparent:true" segments-radial="20" segments-tubular="8"></a-torus>
        <a-sphere position="0 0.96 0.09" radius="0.018" color="#FFD54F" material="opacity:0.8;transparent:true;emissive:#FFD54F;emissiveIntensity:0.4"></a-sphere>

        <!-- LIGHTING -->
        <a-light type="point" intensity="0.8" distance="5" color="#FFD54F" position="0 2.0 0.8"></a-light>
        <a-light type="point" intensity="0.4" distance="4" color="#FFFFFF" position="0 1.0 -0.8"></a-light>
        <a-light type="ambient" intensity="0.6" color="#FFF8E1"></a-light>

        <!-- PARTICLES -->
        <a-sphere position="0.35 1.0 0.2" radius="0.018" color="#FFD54F" material="opacity:0.7;transparent:true;emissive:#FFD54F;emissiveIntensity:0.6" animation="property:position;to:0.35 1.5 0.2;dur:3000;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>
        <a-sphere position="-0.30 0.7 0.15" radius="0.014" color="#FFA726" material="opacity:0.6;transparent:true;emissive:#FFA726;emissiveIntensity:0.4" animation="property:position;to:-0.30 1.2 0.15;dur:2700;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>
        <a-sphere position="0.20 1.4 -0.10" radius="0.016" color="#FFD54F" material="opacity:0.5;transparent:true;emissive:#FFD54F;emissiveIntensity:0.3" animation="property:position;to:0.20 1.8 -0.10;dur:3200;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>
        <a-sphere position="-0.15 1.6 0.20" radius="0.012" color="#FFE082" material="opacity:0.55;transparent:true;emissive:#FFE082;emissiveIntensity:0.4" animation="property:position;to:-0.15 2.0 0.20;dur:2500;easing:easeInOutSine;loop:true;dir:alternate"></a-sphere>

        <!-- ROTATING RING -->
        <a-torus position="0 0.06 0" rotation="90 0 0" radius="0.58" radius-tubular="0.004" color="#FFD54F" material="opacity:0.25;transparent:true;emissive:#FFD54F;emissiveIntensity:0.3" animation="property:rotation;to:90 360 0;dur:10000;easing:linear;loop:true"></a-torus>

    </a-entity>
</a-marker>

<a-entity camera></a-entity>
</a-scene>

<script>
const scene=document.getElementById('ar-scene');
scene.addEventListener('loaded',()=>{setTimeout(()=>{document.getElementById('loading-overlay').classList.add('hidden')},1500)});
setTimeout(()=>{document.getElementById('loading-overlay').classList.add('hidden')},5000);
const marker=document.getElementById('ar-marker');
marker.addEventListener('markerFound',()=>{const b=document.getElementById('status-badge');b.textContent='觀音顯現';b.classList.remove('gold');b.classList.add('green');const h=document.getElementById('scan-hint');h.querySelector('.hint-box').textContent='觀音菩薩已顯現';h.querySelector('.hint-sub').textContent='移動手機改變觀看角度';setTimeout(()=>{h.style.opacity='0'},3000)});
marker.addEventListener('markerLost',()=>{const b=document.getElementById('status-badge');b.textContent='搜尋中';b.classList.remove('green');b.classList.add('gold');const h=document.getElementById('scan-hint');h.style.opacity='1';h.querySelector('.hint-box').textContent='請將相機對準 Hiro 標記圖';h.querySelector('.hint-sub').textContent='觀音將從圖上顯現'});
function capturePhoto(){const c=document.querySelector('canvas');if(c){c.toBlob(b=>{if(b){const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='AR觀音打卡.png';a.click();URL.revokeObjectURL(u)}showToast('打卡照片已儲存！')})}}
function shareExp(){if(navigator.share){navigator.share({title:'AR 觀音祈福體驗',text:'我在高雄就服站體驗了 AR 觀音！',url:location.href}).catch(()=>{})}else{navigator.clipboard.writeText(location.href).then(()=>showToast('連結已複製！'))}}
function showInfoModal(){document.getElementById('info-modal').classList.add('active')}
function closeInfoModal(){document.getElementById('info-modal').classList.remove('active')}
function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}
</script>
</body>
</html>
