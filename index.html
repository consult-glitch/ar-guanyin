<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR 觀音體驗</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; font-family: -apple-system, sans-serif; }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 9999;
            background: linear-gradient(135deg, #1a0a2e, #16213e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            transition: opacity 0.6s ease;
        }
        #loading-overlay.hidden { opacity: 0; pointer-events: none; }
        #loading-overlay h2 {
            font-size: 20px;
            background: linear-gradient(135deg, #FFD54F, #FF8A65);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        #loading-overlay p { font-size: 13px; color: rgba(255,255,255,0.5); }
        .loader { width:40px;height:40px;border:3px solid rgba(255,255,255,0.2);border-top-color:#FFD54F;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #hud-top {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }
        .hud-badge {
            padding: 6px 14px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px; font-size: 12px; color: #fff;
        }
        .hud-badge.gold { border-color: rgba(255,200,60,0.3); color: #FFD54F; }
        .hud-badge.green { border-color: rgba(76,175,80,0.4); color: #81C784; }

        #scan-hint {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center;
            animation: hintBounce 2s ease-in-out infinite;
            transition: opacity 0.5s;
        }
        @keyframes hintBounce {
            0%,100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-8px); }
        }
        .hint-box {
            padding: 12px 24px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px; font-size: 14px; color: #fff;
        }
        .hint-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; }

        #bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            padding: 16px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            display: flex; justify-content: center; gap: 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
        }
        .action-btn {
            padding: 12px 20px; border: none; border-radius: 25px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 6px;
        }
        .action-btn.primary { background: linear-gradient(135deg, #FFB74D, #FF8A65); color: #1a0a2e; }
        .action-btn.secondary { background: rgba(255,255,255,0.12); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); color: #fff; }

        .toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            z-index: 9999; padding: 12px 24px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,200,60,0.3);
            color: #FFD54F; border-radius: 25px; font-size: 13px;
            animation: toastAnim 2.5s ease forwards;
        }
        @keyframes toastAnim {
            0% { opacity:0; transform:translateX(-50%) translateY(-10px); }
            15% { opacity:1; transform:translateX(-50%) translateY(0); }
            80% { opacity:1; } 100% { opacity:0; }
        }

        #info-modal {
            display:none; position:fixed; top:0;left:0;right:0;bottom:0;
            z-index:5000; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px);
            align-items:center; justify-content:center; padding:20px;
        }
        #info-modal.active { display:flex; }
        .modal-card {
            background:linear-gradient(135deg,#1e1040,#1a1a3e);
            border:1px solid rgba(255,255,255,0.1); border-radius:24px;
            padding:28px; max-width:340px; width:100%;
        }
        .modal-card h3 { font-size:18px; color:#FFD54F; margin-bottom:12px; }
        .modal-card p { font-size:13px; color:rgba(255,255,255,0.7); line-height:1.7; margin-bottom:16px; }
        .modal-close {
            padding:10px 24px; background:linear-gradient(135deg,#FFB74D,#FF8A65);
            color:#1a0a2e; border:none; border-radius:20px; font-size:14px; font-weight:700; cursor:pointer;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="loader"></div>
    <h2>AR 觀音體驗</h2>
    <p>正在啟動相機...</p>
</div>

<div id="hud-top">
    <span class="hud-badge">高雄就服站</span>
    <span class="hud-badge gold" id="status-badge">搜尋中</span>
</div>

<div id="scan-hint">
    <div class="hint-box">請將相機對準 Hiro 標記圖</div>
    <div class="hint-sub">觀音將從圖上顯現</div>
</div>

<div id="bottom-bar">
    <button class="action-btn secondary" onclick="capturePhoto()">打卡</button>
    <button class="action-btn primary" onclick="showInfoModal()">就業資訊</button>
    <button class="action-btn secondary" onclick="shareExp()">分享</button>
</div>

<div id="info-modal">
    <div class="modal-card">
        <h3>就業服務資訊</h3>
        <p>
            歡迎來到高雄市訓練就業中心！<br><br>
            我們提供：<br>
            ✦ 職業訓練課程<br>
            ✦ 就業媒合服務<br>
            ✦ 創業輔導諮詢<br>
            ✦ 職涯探索工具<br><br>
            掃描現場其他 AR 標記，解鎖更多就業資訊！
        </p>
        <button class="modal-close" onclick="closeInfoModal()">了解！繼續體驗</button>
    </div>
</div>

<!-- AR Scene: using preset HIRO marker -->
<a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
    vr-mode-ui="enabled: false"
    id="ar-scene"
>
    <a-marker preset="hiro" id="ar-marker" emitevents="true"
        smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">

        <!-- Lotus base -->
        <a-entity position="0 0 0" rotation="-90 0 0">
            <a-torus position="0 0 -0.02" radius="0.6" radius-tubular="0.1"
                color="#D4A574" material="opacity:0.8; transparent:true;"
                segments-radial="20" segments-tubular="12">
            </a-torus>
            <a-torus position="0 0 0.02" radius="0.55" radius-tubular="0.07"
                color="#E8C89E" material="opacity:0.6; transparent:true;"
                segments-radial="20" segments-tubular="12">
            </a-torus>
            <a-circle position="0 0 0" radius="0.5" color="#F5E6D0"
                material="opacity:0.5; transparent:true; side:double;">
            </a-circle>
        </a-entity>

        <!-- Guanyin body -->
        <a-entity position="0 0.8 0">
            <!-- Lower robe -->
            <a-cone position="0 -0.35 0" radius-bottom="0.42" radius-top="0.22" height="0.9"
                color="#E8D5B7" material="opacity:0.9; transparent:true; side:double;"
                segments-radial="20">
            </a-cone>

            <!-- Upper body -->
            <a-cone position="0 0.18 0" radius-bottom="0.22" radius-top="0.14" height="0.55"
                color="#F0E0C8" material="opacity:0.9; transparent:true; side:double;"
                segments-radial="16">
            </a-cone>

            <!-- Head -->
            <a-sphere position="0 0.6 0" radius="0.16"
                color="#F5EAD8" material="opacity:0.95; transparent:true;">
            </a-sphere>

            <!-- Eyes (small dark dots) -->
            <a-sphere position="-0.05 0.62 0.14" radius="0.015" color="#4A3728"></a-sphere>
            <a-sphere position="0.05 0.62 0.14" radius="0.015" color="#4A3728"></a-sphere>

            <!-- Crown -->
            <a-cone position="0 0.82 0" radius-bottom="0.12" radius-top="0.04" height="0.2"
                color="#C9A96E" material="opacity:0.9; transparent:true;" segments-radial="8">
            </a-cone>
            <!-- Crown jewel -->
            <a-sphere position="0 0.94 0" radius="0.05"
                color="#FFD54F" material="opacity:0.9; transparent:true; emissive:#FFD54F; emissiveIntensity:0.6;">
            </a-sphere>

            <!-- Halo behind head -->
            <a-torus position="0 0.62 -0.1" rotation="0 0 0"
                radius="0.3" radius-tubular="0.015"
                color="#FFD54F" material="opacity:0.6; transparent:true; emissive:#FFD54F; emissiveIntensity:0.8;"
                segments-radial="36" segments-tubular="12">
            </a-torus>
            <a-torus position="0 0.62 -0.12" rotation="0 0 0"
                radius="0.38" radius-tubular="0.01"
                color="#FFA726" material="opacity:0.3; transparent:true; emissive:#FFA726; emissiveIntensity:0.4;"
                segments-radial="36" segments-tubular="12">
            </a-torus>

            <!-- Left arm -->
            <a-cylinder position="-0.22 0.0 0.06" radius="0.055" height="0.5"
                rotation="0 0 15" color="#E8D5B7"
                material="opacity:0.8; transparent:true;" segments-radial="10">
            </a-cylinder>
            <a-sphere position="-0.12 -0.15 0.12" radius="0.045"
                color="#F5EAD8" material="opacity:0.85; transparent:true;">
            </a-sphere>

            <!-- Right arm -->
            <a-cylinder position="0.22 0.0 0.06" radius="0.055" height="0.5"
                rotation="0 0 -15" color="#E8D5B7"
                material="opacity:0.8; transparent:true;" segments-radial="10">
            </a-cylinder>
            <a-sphere position="0.12 -0.15 0.12" radius="0.045"
                color="#F5EAD8" material="opacity:0.85; transparent:true;">
            </a-sphere>

            <!-- Vase in hands -->
            <a-cylinder position="0 -0.15 0.14" radius="0.04" height="0.14"
                color="#B8860B" material="opacity:0.85; transparent:true;">
            </a-cylinder>
            <a-sphere position="0 -0.08 0.14" radius="0.05"
                color="#DAA520" material="opacity:0.8; transparent:true;">
            </a-sphere>

            <!-- Willow branch from vase -->
            <a-cylinder position="0.02 0.05 0.15" radius="0.008" height="0.2"
                rotation="0 0 -10" color="#6B8E23"
                material="opacity:0.7; transparent:true;">
            </a-cylinder>

            <!-- Flowing scarves -->
            <a-cylinder position="-0.3 0.1 -0.02" radius="0.02" height="0.7"
                rotation="0 0 8" color="#FFE0B2"
                material="opacity:0.4; transparent:true;">
            </a-cylinder>
            <a-cylinder position="0.3 0.1 -0.02" radius="0.02" height="0.7"
                rotation="0 0 -8" color="#FFE0B2"
                material="opacity:0.4; transparent:true;">
            </a-cylinder>
        </a-entity>

        <!-- Glow light -->
        <a-light type="point" intensity="1.0" distance="4" color="#FFD54F" position="0 1.5 0.5"></a-light>
        <a-light type="ambient" intensity="0.5" color="#FFF8E1"></a-light>

        <!-- Floating golden particles -->
        <a-sphere position="0.4 1.0 0.2" radius="0.02" color="#FFD54F"
            material="opacity:0.7; transparent:true; emissive:#FFD54F; emissiveIntensity:0.5;"
            animation="property:position; to:0.4 1.6 0.2; dur:3000; easing:easeInOutSine; loop:true; dir:alternate;">
        </a-sphere>
        <a-sphere position="-0.3 0.8 0.15" radius="0.015" color="#FFA726"
            material="opacity:0.6; transparent:true; emissive:#FFA726; emissiveIntensity:0.4;"
            animation="property:position; to:-0.3 1.3 0.15; dur:2500; easing:easeInOutSine; loop:true; dir:alternate;">
        </a-sphere>
        <a-sphere position="0.2 0.6 -0.1" radius="0.018" color="#FFD54F"
            material="opacity:0.5; transparent:true; emissive:#FFD54F; emissiveIntensity:0.3;"
            animation="property:position; to:0.2 1.1 -0.1; dur:2800; easing:easeInOutSine; loop:true; dir:alternate;">
        </a-sphere>
        <a-sphere position="-0.15 1.2 0.25" radius="0.016" color="#FFE082"
            material="opacity:0.55; transparent:true; emissive:#FFE082; emissiveIntensity:0.4;"
            animation="property:position; to:-0.15 1.7 0.25; dur:3200; easing:easeInOutSine; loop:true; dir:alternate;">
        </a-sphere>
        <a-sphere position="0.25 1.4 -0.15" radius="0.014" color="#FFB74D"
            material="opacity:0.5; transparent:true; emissive:#FFB74D; emissiveIntensity:0.3;"
            animation="property:position; to:0.25 1.8 -0.15; dur:2600; easing:easeInOutSine; loop:true; dir:alternate;">
        </a-sphere>

        <!-- Rotating halo effect at base -->
        <a-torus position="0 0.05 0" rotation="-90 0 0"
            radius="0.65" radius-tubular="0.005"
            color="#FFD54F" material="opacity:0.3; transparent:true; emissive:#FFD54F; emissiveIntensity:0.3;"
            animation="property:rotation; to:-90 360 0; dur:8000; easing:linear; loop:true;">
        </a-torus>
    </a-marker>

    <a-entity camera></a-entity>
</a-scene>

<script>
const scene = document.getElementById('ar-scene');
scene.addEventListener('loaded', () => {
    setTimeout(() => {
        document.getElementById('loading-overlay').classList.add('hidden');
    }, 1500);
});
setTimeout(() => {
    document.getElementById('loading-overlay').classList.add('hidden');
}, 5000);

const marker = document.getElementById('ar-marker');
marker.addEventListener('markerFound', () => {
    const badge = document.getElementById('status-badge');
    badge.textContent = '觀音顯現';
    badge.classList.remove('gold');
    badge.classList.add('green');
    const hint = document.getElementById('scan-hint');
    hint.querySelector('.hint-box').textContent = '觀音菩薩已顯現';
    hint.querySelector('.hint-sub').textContent = '移動手機改變觀看角度';
    setTimeout(() => { hint.style.opacity = '0'; }, 3000);
});

marker.addEventListener('markerLost', () => {
    const badge = document.getElementById('status-badge');
    badge.textContent = '搜尋中';
    badge.classList.remove('green');
    badge.classList.add('gold');
    const hint = document.getElementById('scan-hint');
    hint.style.opacity = '1';
    hint.querySelector('.hint-box').textContent = '請將相機對準 Hiro 標記圖';
    hint.querySelector('.hint-sub').textContent = '觀音將從圖上顯現';
});

function capturePhoto() {
    const c = document.querySelector('canvas');
    if (c) {
        c.toBlob(b => {
            if (b) {
                const u = URL.createObjectURL(b);
                const a = document.createElement('a');
                a.href = u; a.download = 'AR觀音打卡.png'; a.click();
                URL.revokeObjectURL(u);
            }
            showToast('打卡照片已儲存！');
        });
    }
}

function shareExp() {
    if (navigator.share) {
        navigator.share({ title:'AR 觀音祈福體驗', text:'我在高雄就服站體驗了 AR 觀音！', url:location.href }).catch(()=>{});
    } else {
        navigator.clipboard.writeText(location.href).then(() => showToast('連結已複製！'));
    }
}

function showInfoModal() { document.getElementById('info-modal').classList.add('active'); }
function closeInfoModal() { document.getElementById('info-modal').classList.remove('active'); }

function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}
</script>
</body>
</html>
